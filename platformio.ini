; ============================================================
; 植物管理システム - PlatformIO設定
; ============================================================
; ビルド方法:
;   親機: pio run -e master
;   子機: pio run -e slave
;   親機書き込み: pio run -e master -t upload
;   子機書き込み: pio run -e slave -t upload
;   シリアルモニタ: pio device monitor
; ============================================================

[platformio]
default_envs = master, slave

; --- 共通設定 ---
[common]
build_dir = C:/temp/pio-build/plant-system
platform = espressif32
framework = espidf
monitor_speed = 115200
lib_deps =
lib_extra_dirs = lib

; ESP-IDF のmenuconfig設定(sdkconfig)をカスタマイズ
; PlatformIOではboard_build.embed_txtfilesやbuild_flagsで設定可能
build_flags =
    -DLOG_LOCAL_LEVEL=ESP_LOG_INFO

; --- 親機 (Master) ---
; ESP32-S3 または ESP32-C6 を使用
; MATTER対応を見据えてS3/C6を選択
[env:master]
extends = common
; ESP32-S3の場合:
board = esp32-s3-devkitc-1
; ESP32-C6の場合は以下に変更:
; board = esp32-c6-devkitc-1

build_src_filter =
    +<master/>

build_flags =
    ${common.build_flags}
    -DDEVICE_ROLE_MASTER=1
    -DMAX_SLAVE_COUNT=6

; BLE + WiFi 同時使用のためメモリ設定
board_build.partitions = partitions_master.csv

; --- 子機 (Slave) ---
; 通常のESP32で十分
[env:slave]
extends = common
board = seeed_xiao_esp32c6

build_src_filter =
    +<slave/>

build_flags =
    ${common.build_flags}
    -DDEVICE_ROLE_SLAVE=1
    -DDEFAULT_DEEP_SLEEP_MIN=1
    -DDEFAULT_WATER_HUMIDITY_THRESHOLD=30
monitor_port = COM7        ; ← 追加
monitor_speed = 115200     ; ← 追加
monitor_rts = 0            ; ← 追加
monitor_dtr = 0            ; ← 追加

board_build.partitions = partitions_slave.csv
upload_command = C:\Users\inobu\.platformio\packages\tool-esptoolpy\esptool.py --chip esp32 --port COM6 --baud 921600 write_flash -z 0x1000 .pio/build/slave/bootloader.bin 0x8000 .pio/build/slave/partitions.bin 0x10000 .pio/build/slave/firmware.bin
